{% extends 'index.html' %}
{% load static %}
{% block hero_content %}

  <section class="book_section layout_padding" style="position: relative; z-index: 1; width: 100%; display: flex; align-items: center; min-height: 100vh; overflow: hidden;">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 0; pointer-events: none;"></div>
    <div class="container" style="position: relative; z-index: 1;">
      <div class="row justify-content-center">
        <div class="col-md-6 p-5 rounded shadow" style="background-color: rgba(34, 40, 49, 0.9); border: 1px solid #343a40;">
          <h3 class="font-weight-bold mb-4 text-center" style="color: #ffbe33;">
            <i class="fa fa-truck-loading mr-2"></i> Dispatch Weapon Caravan
          </h3>
          <div class="form_container form_container-dark">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
              <div class="form-group mb-4">
                <label class="font-weight-bold small text-warning mb-2">{{ field.label }}</label>
                {{ field }}
              </div>
                {% endfor %}
              <button type="submit" class="btn btn-warning btn-block font-weight-bold text-white mt-4" style="background-color: #ffbe33; border: none; border-radius: 30px; padding: 10px 0; transition: 0.3s;">
                CONFIRM & SEND CARAVAN
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
