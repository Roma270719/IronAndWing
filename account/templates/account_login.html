{% extends 'index.html' %}
{% load static %}
{% block content %}
<section class="book_section layout_padding">
    <div class="container">
        <div class="heading_container mb-5">
            <h2>Lord Authorization</h2>
            <p class="text-muted">Enter the High Guild chambers to track your forge orders.</p>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="form_container">
                    <form action="{% url 'login' %}" method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Username (Lord Name)" required />
                        </div>
                        <div class="mb-3">
                            <input type="password" name="password" class="form-control" placeholder="Password" required />
                        </div>
                        <div class="btn_box mt-4">
                            <button type="submit" class="btn btn-warning text-white font-weight-bold" style="background-color: #ffbe33; border: none; border-radius: 30px; padding: 10px 45px;">
                                SIGN IN
                            </button>
                        </div>
                    </form>
                    <div class="mt-3">
                        <p class="small text-muted">New to the forge? <a href="{% url 'register' %}" class="text-warning font-weight-bold">Register here</a></p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm text-center p-5 d-flex align-items-center justify-content-center" style="border-radius: 10px; min-height: 250px;">
                    <i class="fa fa-key text-warning mb-3" style="font-size: 3rem;"></i>
                    <h5 class="text-muted">The Guild's Great Hall awaits your allegiance.</h5>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
